apiVersion: apps/v1
kind: Deployment
metadata:
  name: budget-book-frontend
  namespace: budget-book
spec:
  replicas: 1
  selector:
    matchLabels:
      app: budget-book-frontend
  template:
    metadata:
      labels:
        app: budget-book-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/choizeus02/budget-book-frontend:2ef1d1a99a2ff419394e585d1ae4cd9d3761b6ab
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: budget-book-frontend
  namespace: budget-book
spec:
  selector:
    app: budget-book-frontend
  ports:
    - port: 80
      targetPort: 80
