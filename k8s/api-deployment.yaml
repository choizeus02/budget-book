apiVersion: apps/v1
kind: Deployment
metadata:
  name: budget-book-api
  namespace: budget-book
spec:
  replicas: 1
  selector:
    matchLabels:
      app: budget-book-api
  template:
    metadata:
      labels:
        app: budget-book-api
    spec:
      containers:
        - name: api
          image: ghcr.io/choizeus02/budget-book-api:1fef8c38cf095498e99bdff2bcf95525e59b90a3
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: budget-book-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: budget-book-api
  namespace: budget-book
spec:
  selector:
    app: budget-book-api
  ports:
    - port: 8000
      targetPort: 8000
